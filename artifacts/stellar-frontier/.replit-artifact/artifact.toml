kind = "web"
previewPath = "/"
title = "Stellar Frontier"
version = "1.0.0"
id = "artifacts/stellar-frontier"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22728

[services.development]
run = "pnpm --filter @workspace/stellar-frontier run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stellar-frontier", "run", "build" ]
publicDir = "artifacts/stellar-frontier/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22728"
BASE_PATH = "/"
